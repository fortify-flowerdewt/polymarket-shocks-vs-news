name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Single deployment at a time; skip queued duplicates.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Observable site
        run: npx observable build

      - name: Configure base path for project Pages site
        run: |
          # GitHub project Pages serves at /<repo>/, but the build assumes /.
          # Patch absolute paths in built HTML/CSS/JS so subdirectory hosting works.
          REPO=$(basename "${{ github.repository }}")
          echo "Repo path: /$REPO/"
          # No-op for now — Observable Framework already emits relative URLs (./_observablehq/...).
          # This step is a placeholder if we ever switch to absolute URLs.

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
